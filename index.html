<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>CasaGarden — Casa Corazón</title>

  <link rel="stylesheet" href="styles.css" />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:wght@600&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>

<body>

<nav class="nav">
  <div class="container nav__inner">
    <div class="brand">
      <span class="sun">🌻</span>
      <span class="brand__name">CasaGarden</span>
    </div>
  </div>
</nav>

<section class="hero">
  <div class="hero__bg"></div>
  <div class="hero__bgOverlay"></div>

  <div class="container hero__inner">
    <h1 class="display">Casa Corazón Workforce Intelligence</h1>
    <p class="lead">
      Interactive leadership diagnostics powered by the Table of Kindness methodology.
    </p>
  </div>
</section>

<!-- ================= STICKER WALL ================= -->

<section class="section reveal">
  <div class="container">

    <h2 class="h2">Values Identification Study</h2>
    <p class="subhead">
      You have <strong id="stickerRemaining">3</strong> sticky notes. Place them on what matters most at work.
    </p>

    <div class="stickerGrid" id="stickerGrid"></div>

    <div class="topValues">
      <div class="muted small">Your top values</div>
      <div class="topValues__row" id="topValuesRow"></div>
    </div>

    <div class="topValues" style="margin-top:12px">
      <div class="muted small">Quadrant insight</div>
      <div id="quadrantResult" style="margin-top:10px;font-weight:800"></div>
      <div id="quadrantTips" class="muted" style="margin-top:8px;line-height:1.5"></div>
    </div>

  </div>
</section>

<script src="app.js"></script>
</body>
</html>
